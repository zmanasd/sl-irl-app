name: PiPMinimalTest
options:
  bundleIdPrefix: com.irlalert
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  PiPMinimalTest:
    type: application
    platform: iOS
    sources:
      - PiPMinimalTest
    info:
      path: PiPMinimalTest/Info.plist
      properties:
        CFBundleDisplayName: PiPMinimalTest
        CFBundleIdentifier: com.irlalert.pipminimaltest
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.irlalert.pipminimaltest
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
